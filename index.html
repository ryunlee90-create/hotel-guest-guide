<!DOCTYPE html>

  <title>고객 이용 안내</title>

<body>
  <h1>고객 이용 안내</h1>
  <p>호텔 이용 중 자주 문의하시는 내용을 안내드립니다.</p>

  <h2>자주 묻는 질문</h2>

  <h3>체크아웃 연장이 가능한가요?</h3>
  <p>체크아웃 연장은 당일 객실 상황에 따라 가능 여부가 달라집니다. 이용을 원하실 경우 프런트로 문의해 주세요.</p>

  <h3>짐 보관이 가능한가요?</h3>
  <p>체크인 전 또는 체크아웃 후 짐 보관이 가능합니다. 프런트로 문의해 주세요.</p>

  <h3>대여 가능한 물품은 무엇인가요?</h3>
  <p>충전기, 어댑터, 와인 오프너 등 일부 물품 대여가 가능합니다. 수량이 한정되어 있어 조기 소진될 수 있습니다.</p>
</body>
</html>
